server {
    listen 80;
    server_name photos;

    client_max_body_size 1G;

    # Set the root to the correct directory
    root /var/www/public;  # For Laravel or other frameworks, use 'public' directory
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handling
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;  # Ensure it points to the 'php' container on port 9000
        fastcgi_param SCRIPT_FILENAME /var/www/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/public;
    }

    location ~ /\.ht {
        deny all;
    }
}
