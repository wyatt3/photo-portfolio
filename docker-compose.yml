services:
  traefik:
    image: traefik:latest
    command:
      - "--api.insecure=true" # Enable the dashboard (you can disable this for production)
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80" # Listen on port 80
    ports:
      - "80:80" # HTTP
      - "8080:8080" # Dashboard for Traefik (optional)
    networks:
      - photos
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`traefik.local`)" # Access dashboard at traefik.local
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock" # Allows Traefik to interact with Docker
    restart: unless-stopped
  php:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: php
    volumes:
      - .:/var/www
      - ./.docker/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
      - /storage:/storage
    extra_hosts:
      - "photos:host-gateway"
    expose:
      - 9000
    networks:
      - photos
    restart: unless-stopped

  js:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: js
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/node_modules
    networks:
      - photos
    ports:
      - "5175:5175"
    command: npm run dev
    restart: unless-stopped

  mysql:
    image: mysql:latest
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./.docker/mysql:/docker-entrypoint-initdb.d
      - type: tmpfs
        target: /var/lib/mysql
        tmpfs:
          size: 1073741824 # 1GB
    ports:
      - 127.0.0.1:3306:3306
    networks:
      - photos
    environment:
      TZ: "MST"
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_PASSWORD: ""
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - .:/var/www/
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /storage:/storage
    extra_hosts:
      - "photos:host-gateway"
    ports:
      - "8081:80" # Expose port 8081 locally, Nginx will run on port 80 in the container
    networks:
      - photos
    depends_on:
      - php
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nginx-photos.rule=Host(`photos`)" # Routes to Nginx for the Laravel app
      - "traefik.http.services.nginx-photos.loadbalancer.server.port=80"
    restart: unless-stopped

networks:
  photos:
    driver: bridge
    external: true

volumes:
  mysql:
    external: true
